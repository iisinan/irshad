<!doctype html>
<html lang="en" class="no-scroll">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IRSHAD - Islamic Wealth Management</title>
    <script>
      if (localStorage.getItem('irshad_theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    </script>
    <style>
      body, html { margin: 0; padding: 0; background-color: var(--bg, #F8FAFC); }
      body.no-scroll, html.no-scroll { height: 100%; overflow: hidden; }
      #irshad-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #FFFFFF 0%, #F1F5F9 100%);
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform: translateY(-20px);
      }
      .splash-logo {
        width: 150px;
        height: auto;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        filter: drop-shadow(0 15px 35px rgba(15, 82, 87, 0.15));
      }
      @keyframes pulse {
        0%, 100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: .6;
          transform: scale(0.95);
        }
      }
      .splash-hidden {
        opacity: 0;
        pointer-events: none;
        transform: scale(1.02);
      }
    </style>
  </head>
  <body class="no-scroll">
    <div id="irshad-splash" class="splash-container">
      <div class="splash-content">
        <img src="/logo.svg" alt="Irshad Logo" class="splash-logo" />
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
