<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web</title>
  </head>
  <body>
    <div id="root">
      <style>
        body, html { margin: 0; padding: 0; background-color: #F8FAFC; height: 100vh; overflow: hidden; }
        .splash-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .splash-logo { width: 140px; height: auto; display: flex; align-items: center; justify-content: center; animation: pulse 2s infinite ease-in-out; margin-bottom: 24px; filter: drop-shadow(0 10px 25px rgba(15, 82, 87, 0.4)); }
        @keyframes pulse {
          0% { transform: scale(0.95); }
          70% { transform: scale(1.05); }
          100% { transform: scale(0.95); }
        }
        @keyframes fade { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      </style>
      <div class="splash-container">
        <img src="/logo.png" alt="Irshad Logo" class="splash-logo" />
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
