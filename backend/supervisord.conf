[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:octane]
command=php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8080 --workers=1 --task-workers=1 --max-requests=250
directory=/var/www
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:ai-engine]
command=/var/www/ai-engine/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
directory=/var/www/ai-engine
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:queue-worker]
command=php artisan queue:work database --sleep=3 --tries=3 --memory=64
directory=/var/www
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
